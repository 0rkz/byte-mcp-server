    <rect x="9"  y="2"  width="2" height="22" fill="#E8E2D5"/>
    <rect x="12" y="10" width="2" height="14" fill="#C97A4A"/>
    <rect x="15" y="0"  width="2" height="24" fill="#E8E2D5"/>
    <rect x="18" y="12" width="2" height="12" fill="#E8E2D5"/>
