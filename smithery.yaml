# Smithery configuration: https://smithery.ai/docs/config#smitheryyaml
#
# byte-mcp-server supports two transports:
#   - HTTP (default for Smithery hosted listings, since 0.10.0; current 0.11.2):
#       https://mcp.payperbyte.io/mcp
#       — scanner-friendly: 202 on orphan notifications, stateless fallback
#         for streamable-http requests missing session-id (v0.10.2+)
#       — multi-session McpServer factory (v0.10.1+)
#       — full outputSchema + annotations on all 15 tools (v0.11.0+ adds byte_verify_payload: verify-before-act)
#   - stdio (for local Claude Desktop / Cursor / Windsurf installs):
#       npx -y byte-mcp-server@latest
#
# Both config values are optional — read-only tools (search, get_publisher,
# list_my_subscriptions, subscription_health, get_network_stats, list_feeds,
# check_subscription, get_token_balances, query_fact, verify_payload) work without any config.
# Write tools (subscribe, unsubscribe, register_publisher, publish_data,
# buy_data) require privateKey.

startCommand:
  type: http
  url: https://mcp.payperbyte.io/mcp
  configSchema:
    type: object
    properties:
      privateKey:
        type: string
        description: "Ethereum private key for write operations (subscribe, publish, unsubscribe, buy_data). Leave blank for read-only mode."
      rpcUrl:
        type: string
        description: "Arbitrum RPC URL. Defaults to public Arbitrum Sepolia RPC."
        default: "https://sepolia-rollup.arbitrum.io/rpc"
